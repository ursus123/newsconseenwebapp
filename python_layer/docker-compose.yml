version: "3.9"

services:
  fastapi:
    build: ./fastapi
    container_name: newsconseen_fastapi
    ports:
      - "8000:8000"
    volumes:
      - ./fastapi:/app
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/newsconseen

  postgres:
    image: postgres:15
    container_name: newsconseen_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: newsconseen
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  airflow-webserver:
    image: apache/airflow:2.9.0
    container_name: newsconseen_airflow_webserver
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/newsconseen
      AIRFLOW__WEBSERVER__RBAC: "True"
    ports:
      - "8080:8080"
    command: webserver
    volumes:
      - ./airflow:/opt/airflow

  airflow-scheduler:
    image: apache/airflow:2.9.0
    container_name: newsconseen_airflow_scheduler
    depends_on:
      - airflow-webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/newsconseen
    command: scheduler
    volumes:
      - ./airflow:/opt/airflow

  superset:
    image: apache/superset:latest
    container_name: newsconseen_superset
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: "supersecret"
    depends_on:
      - postgres
    volumes:
      - superset_home:/app/superset_home

volumes:
  postgres_data:
  superset_home:
