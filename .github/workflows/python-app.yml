name: Python CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Lint + Test (python_layer)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: python_layer

    env:
      # Stub env vars so pydantic Settings loads without Railway secrets
      BASE44_API_KEY:          "ci-stub-key"
      BASE44_PEOPLE_URL:       "https://stub.example.com/people"
      BASE44_ENTERPRISES_URL:  "https://stub.example.com/enterprises"
      BASE44_PRODUCTS_URL:     "https://stub.example.com/products"
      BASE44_TASKS_URL:        "https://stub.example.com/tasks"
      BASE44_TRANSACTIONS_URL: "https://stub.example.com/transactions"
      BASE44_SERVICES_URL:     "https://stub.example.com/services"
      DATABASE_URL:            ""
      CRON_SECRET:             "ci-secret"
      ANTHROPIC_API_KEY:       "ci-anthropic-key"
      API_KEY:                 ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: python_layer/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pytest-cov httpx
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # ── Lint: syntax errors and undefined names (hard fail) ──────────────
      - name: Lint — syntax errors + undefined names
        run: |
          flake8 . \
            --count --select=E9,F63,F7,F82 \
            --show-source --statistics \
            --exclude=__pycache__,.venv,tests

      # ── Lint: style warnings (soft — report only, don't fail build) ──────
      - name: Lint — style warnings
        run: |
          flake8 . \
            --count --exit-zero \
            --max-complexity=12 --max-line-length=130 \
            --statistics \
            --exclude=__pycache__,.venv

      # ── Tests with coverage ───────────────────────────────────────────────
      - name: Run tests
        run: |
          pytest tests/ -v --tb=short \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-omit="tests/*,__pycache__/*,*/.venv/*" \
            -x

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: python_layer/coverage.xml

  health-check:
    name: Post-deploy health check
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # Runs ~3 minutes after tests pass to give Railway time to deploy
    steps:
      - name: Wait for Railway deploy
        run: sleep 180

      - name: Ping /health
        env:
          RAILWAY_URL: ${{ secrets.RAILWAY_URL }}
        run: |
          if [ -z "$RAILWAY_URL" ]; then
            echo "RAILWAY_URL secret not set — skipping health check"
            exit 0
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${RAILWAY_URL}/health")
          echo "Health check HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
          echo "Health check passed"

      - name: Assert database not in error state
        env:
          RAILWAY_URL: ${{ secrets.RAILWAY_URL }}
        run: |
          if [ -z "$RAILWAY_URL" ]; then
            exit 0
          fi
          BODY=$(curl -s "${RAILWAY_URL}/health")
          echo "$BODY"
          DB=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('database',''))")
          if [[ "$DB" == error* ]]; then
            echo "Database in error state: $DB"
            exit 1
          fi
          echo "Database status: $DB"
